<!DOCTYPE html>
<html>
<head>
    <title>Каталог автомобилей</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f4f4f4; }
        h1 { color: #333; }
        .card {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <h1>🚗 Каталог автомобилей</h1>

    {% for car in cars %}
        <div class="card">
            <h2>
                <a href="/cars/{{ car.id }}/">{{ car.name }}</a>
            </h2>
            <p>Бренд: {{ car.brand }}</p>
            <p>Цена: {{ car.price }} сом</p>
        </div>
    {% endfor %}
</body>
</html>
