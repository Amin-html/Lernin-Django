<!DOCTYPE html>
<html>
<head>
    <title>Добавить ноутбук</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f4f4f4; }
        .card {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            max-width: 500px;
        }
        input {
            width: 100%;
            padding: 8px;
            margin: 5px 0 15px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }
        button {
            padding: 10px 20px;
            background: #333;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
        }
        a { color: #333; text-decoration: none; }
        .back { display: block; margin-bottom: 15px; }
    </style>
</head>
<body>
    <a class="back" href="/laptops/">← Назад к каталогу</a>

    <div class="card">
        <h1>➕ Добавить ноутбук</h1>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Сохранить</button>
        </form>
    </div>
</body>
</html>
