<!DOCTYPE html>
<html>
<head>
    <title>Каталог ноутбуков</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f4f4f4; }
        h1 { color: #333; }
        .card {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <h1>💻 Каталог ноутбуков</h1>

    <form method="GET">
        <input 
            type="text" 
            name="q" 
            value="{{ query }}"
            placeholder="Поиск по названию..."
            style="padding: 8px; width: 300px; border-radius: 5px; border: 1px solid #ccc;"
        >
        <button 
            type="submit"
            style="padding: 8px 15px; border-radius: 5px; background: #333; color: white; border: none; cursor: pointer;"
        >
            Найти
        </button>
    </form>

    {% for laptop in laptops %}
        <div class="card">
            <h2>
                <a href="/laptops/{{ laptop.id }}/">{{ laptop.name }}</a>
            </h2>
            <p>Бренд: {{ laptop.brand }}</p>
            <p>Цена: {{ laptop.price }} сом</p>
        </div>
    {% endfor %}
</body>
</html>
