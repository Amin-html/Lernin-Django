<!DOCTYPE html>
<html>
<head>
    <title>{{ laptop.name }}</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f4f4f4; }
        .card {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            max-width: 500px;
        }
        a { color: #333; text-decoration: none; }
        .back { margin-bottom: 15px; display: block; }
    </style>
</head>
<body>
    <a class="back" href="/laptops/">← Назад к каталогу</a>

    <div class="card">
        <h1>💻 {{ laptop.name }}</h1>
        <p><b>Бренд:</b> {{ laptop.brand }}</p>
        <p><b>Цена:</b> {{ laptop.price }} сом</p>
        <p><b>RAM:</b> {{ laptop.ram }} ГБ</p>

        <a href="/laptops/{{ laptop.id }}/update/" style="
            display: inline-block;
            padding: 8px 15px;
            background: #333;
            color: white;
            border-radius: 5px;
            text-decoration: none;
            margin-top: 15px;
            margin-right: 10px;
        ">✏️ Редактировать</a>

        <a href="/laptops/{{ laptop.id }}/delete/" style="
            display: inline-block;
            padding: 8px 15px;
            background: #e74c3c;
            color: white;
            border-radius: 5px;
            text-decoration: none;
            margin-top: 15px;
        ">🗑️ Удалить</a>
    </div>
</body>
</html>
